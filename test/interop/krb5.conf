# Minimal krb5.conf for the interop harness: a single local realm served by the
# in-container KDC. Used as /etc/krb5.conf.
[libdefaults]
    default_realm = EXAMPLE.COM
    dns_lookup_kdc = false
    dns_lookup_realm = false
    rdns = false
    permitted_enctypes = aes256-cts-hmac-sha1-96

[realms]
    EXAMPLE.COM = {
        kdc = localhost
        admin_server = localhost
    }
